name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

# Cancel any in-progress run for the same branch / PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs run in parallel; 'test' is the only matrix job ───────────────────────

jobs:

  # ── 1. Lint & format ────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install ruff
        run: uv tool install ruff

      - name: ruff — check rules
        run: ruff check .

      - name: ruff — check formatting
        run: ruff format --check .

  # ── 2. Static type checking ──────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install deps
        run: uv sync --extra html --extra dev

      - name: mypy
        run: uv run mypy ster/

  # ── 3. Security ──────────────────────────────────────────────────────────────
  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install deps
        run: uv sync --extra html --extra dev

      - name: bandit — static analysis
        run: uv run bandit -r ster/ -c pyproject.toml

      - name: pip-audit — dependency CVEs
        run: uv run pip-audit

  # ── 4. Tests + coverage ──────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: uv sync --extra html --extra dev

      - name: Run tests with coverage
        run: uv run pytest --tb=short -q --cov=ster --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        # Upload only once (latest Python) to avoid duplicate reports
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false   # don't break CI if Codecov is unreachable
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── 5. Publish to PyPI ───────────────────────────────────────────────────────
  # Runs only on pushes to master (not PRs) after all checks pass.
  # Skips automatically if the version in pyproject.toml is already on PyPI.
  # Uses PyPI trusted publishing (OIDC) — no token stored in GitHub secrets.
  #
  # One-time setup required on PyPI:
  #   pypi.org → ster project → Publishing → Add a new publisher
  #     Publisher:      GitHub Actions
  #     Owner:          gbelbe
  #     Repository:     ster
  #     Workflow name:  ci.yml
  #     Environment:    (leave blank)
  publish:
    name: Publish to PyPI
    needs: [lint, typecheck, security, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Check whether this version is already published
        id: check
        run: |
          LOCAL=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          REMOTE=$(curl -sf https://pypi.org/pypi/ster/json \
            | python -c "import sys,json; print(json.load(sys.stdin)['info']['version'])" \
            || echo "0.0.0")
          echo "local=$LOCAL"
          echo "remote=$REMOTE"
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "publish=true"  >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.check.outputs.publish == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.check.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
